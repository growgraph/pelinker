name: pre-commit

on:
    pull_request:
    push:
        branches: [main]

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
        -   uses: actions/checkout@v5
        -   name: Install uv
            uses: astral-sh/setup-uv@v7
            with:
                version: "0.10.12"
        -   name: Install dependencies (including dev)
            run: uv sync --extra dev --no-install-project
        -   name: Run pre-commit
            run: uv run pre-commit run --all-files
