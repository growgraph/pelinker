<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@700');
      .icon-stroke { stroke: #BE5103; stroke-width: 4; fill: none; }
      .text { font: bold 44px 'Open Sans', sans-serif; fill: #293241; }
    </style>
  </defs>

  <g transform="translate(-2 3)">
    
    <!-- The "P" (Thick strokes) -->
    <g fill="none" stroke="#BE5103" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Stem at base x=54 -->
      <line x1="54" y1="18" x2="54" y2="78" />
      <!-- Bowl: Large arc flag '1' makes it very pronounced -->
      <path d="M 54 18 A 20 16 0 1 1 54 48" />
    </g>

    <!-- The Wings (Thinner strokes) -->
    <g fill="none" stroke="#BE5103" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Top Wing -->
      <circle cx="30" cy="32" r="8" />
      <line x1="38" y1="35" x2="54" y2="46" />

      <!-- Bottom Wing -->
      <circle cx="30" cy="60" r="8" />
      <line x1="38" y1="57" x2="54" y2="46" />
    </g>
    
  </g>

<!--  <text x="85" y="60" class="text">graflo</text>-->
</svg>