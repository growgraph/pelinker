site_name: Pelinker
site_description: Bio / science property–entity linker (encoder-based linking utilities and API)
site_url: https://growgraph.github.io/pelinker
repo_url: https://github.com/growgraph/pelinker
repo_name: growgraph/pelinker
copyright: Copyright &copy; 2026 GrowGraph

theme:
    name: material
    user_color_mode_toggle: true
    palette:
    -   scheme: default
        primary: indigo
        accent: teal
        toggle:
            icon: material/toggle-switch-off-outline
            name: Switch to dark mode
    -   scheme: slate
        primary: blue grey
        accent: cyan
        toggle:
            icon: material/toggle-switch
            name: Switch to light mode
    # Paths are relative to docs_dir (docs/); repo-root static/ is for the app server, not MkDocs.
    logo: assets/project_logo.png
    icon:
        repo: fontawesome/brands/github
    favicon: assets/favicon.ico

plugins:
-   search
-   glightbox
-   gen-files:
        scripts:
        -   docs/gen_pages.py
-   literate-nav
-   mkdocstrings:
        default_handler: python
        handlers:
            python:
                options:
                    extra:
                        show_root_full_path: true
                        show_docstring: true
                        show_source: true
                        show_root_toc_entry: false
                        docstring_style: google
                        show_submodules: true
                        show_category_heading: true
                        show_if_no_docstring: true
                        setup_commands:
                        -   "import sys"
                        -   "sys.path.append('.')"

docs_dir: docs

nav:
-   Home: index.md
-   User Guide:
    -   Run scripts & CLIs: user_guide/run_scripts_and_cli.md
    -   Vector representations: user_guide/vector_representation.md
-   API Reference: reference/

markdown_extensions:
-   pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
-   def_list
-   pymdownx.tasklist:
        custom_checkbox: true
-   pymdownx.inlinehilite
-   pymdownx.snippets
-   pymdownx.superfences
-   attr_list
-   md_in_html
-   admonition
-   codehilite
-   footnotes
-   meta
-   pymdownx.blocks.caption
-   admonition
-   pymdownx.superfences
-   pymdownx.details
-   pymdownx.tabbed
-   pymdownx.highlight
-   pymdownx.emoji
-   pymdownx.tasklist
-   pymdownx.keys
-   pymdownx.snippets
-   pymdownx.magiclink
-   pymdownx.betterem
-   pymdownx.caret
-   pymdownx.tilde
-   pymdownx.mark
-   pymdownx.smartsymbols
-   pymdownx.arithmatex
-   pymdownx.progressbar
-   pymdownx.escapeall

-   toc:
        permalink: true
